<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHBM</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0f11;--paper:#f5f3ef;--cream:#edeae3;--tan:#ddd8cd;
  --mid:#8a8378;--ghost:#b8b2a8;--accent:#1a3a5c;--gold:#b8860b;
  --white:#ffffff;--r:8px;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;--serif:'Instrument Serif',Georgia,serif;
}
[data-theme="dark"]{
  --ink:#e8e6e1;--paper:#0f1117;--cream:#1a1d27;--tan:#2a2d3a;
  --mid:#7a7a8a;--ghost:#4a4a5a;--accent:#5b8fd4;--gold:#d4af37;--white:#1a1d27;
}
html{scroll-behavior:smooth}
body{
  background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;
  display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden;
}

/* Subtle ambient backdrop — soft radial glow, no gradients on text/cards */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 15%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 45%),
    radial-gradient(circle at 85% 80%, color-mix(in srgb, var(--gold) 6%, transparent), transparent 45%);
}

.theme-toggle{position:fixed;top:18px;right:18px;z-index:200;background:var(--white);border:1px solid var(--tan);border-radius:20px;padding:7px 14px;font-family:var(--mono);font-size:11px;color:var(--mid);cursor:pointer;transition:all .2s;}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

.wrap{max-width:460px;width:100%;padding:32px 24px;text-align:center;position:relative;z-index:1}

.brand-mark{
  width:72px;height:72px;border-radius:18px;background:var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:30px;
  margin:0 auto 22px;box-shadow:0 8px 28px -8px color-mix(in srgb, var(--ink) 45%, transparent);
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
}
.brand-name{
  font-family:var(--serif);font-size:40px;font-style:italic;letter-spacing:-.02em;
  margin-bottom:6px;line-height:1;animation:rise .6s cubic-bezier(.2,.8,.2,1) .05s both;
}
.brand-sub{
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mid);margin-bottom:6px;animation:rise .6s cubic-bezier(.2,.8,.2,1) .1s both;
}
.brand-rule{
  width:36px;height:1px;background:var(--gold);margin:0 auto 44px;opacity:.7;
  animation:rise .6s cubic-bezier(.2,.8,.2,1) .15s both;
}

.links{display:flex;flex-direction:column;gap:12px}
.link-card{
  display:flex;align-items:center;gap:16px;background:var(--white);
  border:1px solid var(--tan);border-radius:16px;padding:18px 20px;
  text-decoration:none;color:var(--ink);position:relative;overflow:hidden;
  transition:transform .25s cubic-bezier(.2,.8,.2,1),border-color .25s,box-shadow .25s;
  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
}
.link-card:nth-child(1){animation-delay:.2s}
.link-card:nth-child(2){animation-delay:.28s}
.link-card:nth-child(3){animation-delay:.36s}
.link-card:nth-child(4){animation-delay:.44s}

.link-card::after{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(120deg, transparent 30%, color-mix(in srgb, var(--accent) 6%, transparent) 50%, transparent 70%);
  transform:translateX(-100%);transition:transform .6s ease;
}
.link-card:hover::after{transform:translateX(100%)}
.link-card:hover{
  transform:translateY(-3px);border-color:color-mix(in srgb, var(--accent) 40%, var(--tan));
  box-shadow:0 14px 32px -16px color-mix(in srgb, var(--ink) 25%, transparent);
}
.link-card:active{transform:translateY(-1px)}

.link-ico{
  font-size:24px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;
  background:var(--cream);border-radius:13px;flex-shrink:0;transition:transform .25s,background .25s;
}
.link-card:hover .link-ico{transform:scale(1.08) rotate(-4deg)}
.link-text{text-align:left;flex:1}
.link-title{font-weight:600;font-size:16px;margin-bottom:2px;letter-spacing:-.01em}
.link-sub{font-size:12.5px;color:var(--mid);line-height:1.4}
.link-arrow{font-family:var(--mono);font-size:14px;color:var(--ghost);transition:transform .25s,color .25s}
.link-card:hover .link-arrow{transform:translateX(3px);color:var(--accent)}

.footer-note{
  margin-top:36px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
  color:var(--ghost);animation:rise .6s cubic-bezier(.2,.8,.2,1) .36s both;
}

@keyframes rise{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:400px){
  .wrap{padding:24px 18px}
  .brand-name{font-size:34px}
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
<div class="wrap">
  <div class="brand-mark">☕</div>
  <div class="brand-name">FHBM</div>
  <div class="brand-sub">From Here By Mike</div>
  <div class="brand-rule"></div>

  <div class="links">
    <a class="link-card" href="briefing.html">
      <div class="link-ico">📋</div>
      <div class="link-text">
        <div class="link-title">Briefing Sheet</div>
        <div class="link-sub">Roster, occupancy, sections &amp; comments</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

    <a class="link-card" href="late.html">
      <div class="link-ico">⏰</div>
      <div class="link-text">
        <div class="link-title">Late Tracker</div>
        <div class="link-sub">Check and track lates by month</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

    <a class="link-card" href="training.html">
      <div class="link-ico">🎓</div>
      <div class="link-text">
        <div class="link-title">Evening Training</div>
        <div class="link-sub">Schedule the daily 5-min briefing training</div>
      </div>
      <div class="link-arrow">→</div>
    </a>

    <a class="link-card" href="incentives.html">
      <div class="link-ico">🏆</div>
      <div class="link-text">
        <div class="link-title">Sales Incentives</div>
        <div class="link-sub">Daily &amp; monthly staff challenges</div>
      </div>
      <div class="link-arrow">→</div>
    </a>
  </div>

  <div class="footer-note">FHBM OPERATIONS · INTERNAL USE</div>
</div>
<script>
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeToggle').textContent=isDark?'🌙 Dark':'☀️ Light';
  try{localStorage.setItem('fhbm_theme',isDark?'light':'dark');}catch(e){}
}
try{
  if(localStorage.getItem('fhbm_theme')==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent='☀️ Light';
  }
}catch(e){}
</script>
</body>
</html>
